<style>

}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
body{font-family:'Cairo',sans-serif;background:var(--dark);color:#fff;height:100vh;overflow:hidden;}
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse at 15% 50%,rgba(124,58,237,.12) 0%,transparent 55%),

  radial-gradient(ellipse at 50% 90%,rgba(255,165,0,.07) 0%,transparent 50%);}
.app{position:relative;z-index:1;max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column;}

/* ── TELEGRAM BADGE ── */
.tg-badge{display:flex;align-items:center;justify-content:center;gap:6px;
  background:rgba(0,136,204,.12);border-bottom:1px solid rgba(0,136,204,.2);
  padding:5px;font-size:10px;color:rgba(0,136,204,.9);}
.tg-badge.demo{background:rgba(255,165,0,.08);border-color:rgba(255,165,0,.2);color:rgba(255,165,0,.8);}
.tg-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1.4s infinite;}

/* HEADER */
.header{padding:10px 14px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.05);}
.user-row{display:flex;align-items:center;gap:9px;}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#000;box-shadow:0 0 14px rgba(255,215,0,.45);flex-shrink:0;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.u-name{font-size:13px;font-weight:700;}
.u-lvl{font-size:10px;color:var(--gold);}
.wallet-btn{background:linear-gradient(135deg,#0a2a3a,#0d3550);border:1px solid rgba(0,212,255,.35);border-radius:18px;padding:7px 13px;color:var(--accent);font-size:11px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;transition:.2s;white-space:nowrap;}
.wallet-btn.ok{border-color:rgba(0,255,136,.4);color:var(--green);background:linear-gradient(135deg,#0a2a1a,#0d3520);}
.wallet-btn:active{transform:scale(.95);}

/* BALANCE */
.balance-bar{margin:8px 14px 6px;background:linear-gradient(135deg,rgba(255,215,0,.07),rgba(255,165,0,.04));border:1px solid rgba(255,215,0,.18);border-radius:18px;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;}
.bal-center{text-align:center;}
.bal-lbl{font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;}
.bal-num{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;}
.bal-usd{font-size:11px;color:var(--green);font-weight:700;}
.bal-side{text-align:center;}
.bs-val{font-size:15px;font-weight:800;color:var(--accent);}
.bs-lbl{font-size:9px;color:rgba(255,255,255,.35);}

/* PAGES */
.pages{flex:1;overflow:hidden;position:relative;}
.page{position:absolute;inset:0;overflow-y:auto;padding:0 14px 86px;display:none !important;}
.page.active{display:block !important;}
.page::-webkit-scrollbar{display:none;}

/* TAP PAGE */
#page-tap.active{display:flex !important;flex-direction:column;align-items:center;padding-top:8px;}
.lvl-badge{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.25);border-radius:20px;padding:3px 14px;font-size:11px;color:var(--gold);margin-bottom:12px;}
.coin-wrap{position:relative;width:210px;height:210px;margin-bottom:18px;}
.ring{position:absolute;top:50%;left:50%;border-radius:50%;transform:translate(-50%,-50%);animation:rp 2.5s ease-in-out infinite;pointer-events:none;}
.r1{width:238px;height:238px;border:1px solid rgba(255,215,0,.12);}
.r2{width:266px;height:266px;border:1px solid rgba(255,215,0,.06);animation-delay:.8s;}
@keyframes rp{0%,100%{opacity:.4;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.04)}}
.coin{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle at 32% 30%,#fffde7 0%,#FFD700 28%,#FFA500 58%,#b36200 100%);
  border:none;cursor:pointer;
  box-shadow:0 0 0 4px rgba(255,215,0,.25),0 0 50px rgba(255,165,0,.35),0 12px 35px rgba(0,0,0,.55),inset 0 3px 10px rgba(255,255,255,.45),inset 0 -3px 8px rgba(0,0,0,.3);
  transition:transform .07s,box-shadow .07s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;}

.withdraw-progress{margin:0 14px 8px;background:rgba(0,255,136,.05);border:1px solid rgba(0,255,136,.2);border-radius:14px;padding:10px 14px;}
.wp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.wp-lbl{font-size:10px;color:rgba(255,255,255,.5);}
.wp-val{font-size:11px;color:var(--green);font-weight:700;}
.wp-bar{height:8px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden;}
.wp-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#00cc66,var(--green));transition:width .4s ease;}
.wp-note{font-size:9px;color:rgba(0,255,136,.6);text-align:center;margin-top:5px;}

.daily-earn-badge{background:rgba(0,255,136,.07);border:1px solid rgba(0,255,136,.22);border-radius:20px;padding:4px 16px;font-size:11px;color:var(--green);margin-bottom:12px;font-weight:700;}

  cursor:pointer;

  transition:transform .07s,box-shadow .07s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;}
.coin:active{transform:translate(-50%,-50%) scale(.91);box-shadow:0 0 20px rgba(255,165,0,.2),0 4px 14px rgba(0,0,0,.5),inset 0 2px 6px rgba(255,255,255,.2);}
.coin-emoji{font-size:62px;line-height:1;pointer-events:none;}
.coin-name{font-family:'Orbitron',sans-serif;font-size:19px;font-weight:900;color:#6b3600;text-shadow:0 1px 3px rgba(255,255,255,.4);pointer-events:none;}
.float{position:fixed;pointer-events:none;z-index:999;font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;color:var(--gold);text-shadow:0 0 12px rgba(255,215,0,.9);animation:fup 1.1s ease-out forwards;}
@keyframes fup{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-110px) scale(1.6)}}

.energy-section{width:100%;max-width:310px;}
.e-header{display:flex;justify-content:space-between;margin-bottom:5px;}
.e-lbl{font-size:11px;color:rgba(255,255,255,.5);}
.e-val{font-size:11px;color:var(--accent);font-weight:700;}
.e-bg{height:13px;background:rgba(255,255,255,.05);border-radius:7px;overflow:hidden;border:1px solid rgba(0,212,255,.18);}
.e-fill{height:100%;border-radius:7px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .35s ease;position:relative;overflow:hidden;}
.e-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);animation:sh 2s infinite;}
@keyframes sh{0%{transform:translateX(-100%)}100%{transform:translateX(300%)}}

/* TAP STATS */
.tap-stats{width:100%;max-width:310px;margin-top:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.ts-box{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:9px;text-align:center;}
.ts-val{font-size:13px;font-weight:700;color:var(--gold);}
.ts-lbl{font-size:8px;color:rgba(255,255,255,.35);margin-top:2px;}

.withdraw-btn-main{width:100%;max-width:310px;margin-top:12px;padding:13px;background:linear-gradient(135deg,var(--green),#00cc66);border:none;border-radius:14px;color:#000;font-size:14px;font-weight:900;cursor:pointer;font-family:'Cairo',sans-serif;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.withdraw-btn-main:disabled{background:rgba(255,255,255,.08);color:rgba(255,255,255,.25);cursor:not-allowed;}
.withdraw-btn-main:not(:disabled):active{transform:scale(.97);}
.withdraw-lock{font-size:16px;}

/* UPGRADES PAGE */
.page-ttl{font-size:17px;font-weight:900;text-align:center;padding-top:16px;margin-bottom:6px;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.page-sub{font-size:11px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:14px;}
.current-plan-card{background:linear-gradient(135deg,rgba(255,215,0,.1),rgba(255,165,0,.05));border:2px solid rgba(255,215,0,.35);border-radius:18px;padding:14px;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.cp-icon{font-size:36px;}
.cp-info{flex:1;}
.cp-name{font-size:14px;font-weight:900;color:var(--gold);}
.cp-earn{font-size:12px;color:rgba(255,255,255,.6);margin-top:2px;}
.cp-badge{background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.4);border-radius:10px;padding:3px 10px;font-size:10px;color:var(--gold);font-weight:700;}

.up-grid{display:flex;flex-direction:column;gap:9px;}
.up-card{background:linear-gradient(135deg,rgba(20,20,40,.85),rgba(26,26,46,.85));border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:13px;display:flex;align-items:center;gap:11px;transition:.2s;}
.up-card.current{border-color:rgba(255,215,0,.5);background:linear-gradient(135deg,rgba(255,215,0,.08),rgba(255,165,0,.04));}
.up-card.locked{opacity:.6;}
.up-ico{width:50px;height:50px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;}
.ic-lv1{background:linear-gradient(135deg,#374151,#1f2937);}
.ic-lv2{background:linear-gradient(135deg,#0ea5e9,#0284c7);}
.ic-lv3{background:linear-gradient(135deg,#8b5cf6,#7c3aed);}
.ic-lv4{background:linear-gradient(135deg,#f59e0b,#d97706);}
.ic-lv5{background:linear-gradient(135deg,#ef4444,#dc2626);}
.up-info{flex:1;min-width:0;}
.up-name{font-size:13px;font-weight:700;}
.up-earn{font-size:11px;color:var(--green);font-weight:700;margin-top:2px;}
.up-desc{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px;}
.up-btn{background:linear-gradient(135deg,#0088cc,#006699);border:none;border-radius:11px;padding:9px 13px;color:#fff;font-weight:900;font-size:11px;cursor:pointer;font-family:'Cairo',sans-serif;flex-shrink:0;transition:.2s;white-space:nowrap;line-height:1.3;text-align:center;}
.up-btn:active{transform:scale(.94);}
.up-btn:disabled{background:rgba(255,255,255,.08);color:rgba(255,255,255,.25);cursor:not-allowed;}
.up-btn.current-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;cursor:default;}

/* WITHDRAW PAGE */
.withdraw-hero{background:linear-gradient(135deg,rgba(0,255,136,.1),rgba(0,204,102,.05));border:2px solid rgba(0,255,136,.3);border-radius:20px;padding:18px;text-align:center;margin-top:16px;margin-bottom:14px;}
.wh-em{font-size:44px;margin-bottom:6px;}
.wh-ttl{font-size:17px;font-weight:900;color:var(--green);}
.wh-sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:3px;}
.withdraw-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
.wi-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:13px;text-align:center;}
.wi-num{font-size:20px;font-weight:900;}
.wi-lbl{font-size:10px;color:rgba(255,255,255,.45);margin-top:3px;}
.wi-num.green{color:var(--green);}
.wi-num.gold{color:var(--gold);}
.wi-num.ton{color:var(--ton);}

.ps-pct{font-size:9px;font-weight:700;color:#000;}
.ps-note{font-size:10px;color:rgba(255,255,255,.5);text-align:center;}

.ws-ttl{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:10px;}

.wh-addr{font-size:11px;color:rgba(255,255,255,.6);direction:ltr;text-align:left;}
.wh-date{font-size:9px;color:rgba(255,255,255,.35);}
