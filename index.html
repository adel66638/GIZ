<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIZ — لوحة التحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#F5C518;--gold2:#FFD93D;
  --bg:#08080E;--bg2:#0F0F18;--bg3:#131320;--bg4:#0D0D15;
  --txt:#EEEEF5;--txt2:#8888A0;
  --green:#22D17A;--red:#FF4D6A;--blue:#4D9FFF;
  --border:rgba(245,197,24,.13);--border2:rgba(255,255,255,.06);
  --sw:240px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 800px 500px at 15% 10%,rgba(245,197,24,.05) 0%,transparent 70%),
             radial-gradient(ellipse 500px 400px at 85% 85%,rgba(77,159,255,.03) 0%,transparent 70%);
  pointer-events:none;z-index:0;}

/* LOGIN */
#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;padding:2rem;}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:2.8rem 2.4rem;width:100%;max-width:420px;text-align:center;animation:fadeUp .6s ease;}
.login-logo{font-family:'Tajawal',sans-serif;font-size:2.8rem;font-weight:900;color:var(--gold);letter-spacing:5px;}
.login-logo small{display:block;font-size:.6rem;color:var(--txt2);letter-spacing:2px;margin-top:-6px;}
.login-line{width:50px;height:3px;background:var(--gold);border-radius:2px;margin:1.2rem auto;}
.login-box h2{font-size:1.2rem;font-weight:700;margin-bottom:.4rem;}
.login-box p{font-size:.82rem;color:var(--txt2);margin-bottom:2rem;line-height:1.7;}
.btn-google{width:100%;padding:13px 20px;background:#fff;border:none;border-radius:12px;
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-family:'Cairo',sans-serif;font-size:.92rem;font-weight:700;color:#222;
  cursor:pointer;transition:all .3s;box-shadow:0 4px 20px rgba(0,0,0,.3);}
.btn-google:hover{transform:translateY(-2px);}
.spinner-wrap{display:none;flex-direction:column;align-items:center;gap:.8rem;padding:.8rem 0;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
.spinner-wrap p{font-size:.82rem;color:var(--txt2);}
.login-stats{display:flex;justify-content:center;gap:2rem;margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border);}
.ls-num{font-size:1.1rem;font-weight:900;color:var(--gold);font-family:'Tajawal',sans-serif;display:block;}
.ls-label{font-size:.68rem;color:var(--txt2);}

/* DASHBOARD */
#dash-page{display:none;min-height:100vh;position:relative;z-index:1;}

/* SIDEBAR */
.sidebar{width:var(--sw);background:var(--bg4);border-left:1px solid var(--border);
  position:fixed;top:0;right:0;bottom:0;z-index:50;display:flex;flex-direction:column;}
.sb-logo{padding:1.2rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.7rem;}
.sb-mark{width:34px;height:34px;background:var(--gold);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#000;font-size:.9rem;font-family:'Tajawal',sans-serif;}
.sb-txt{font-family:'Tajawal',sans-serif;font-size:1.2rem;font-weight:900;color:var(--gold);letter-spacing:3px;}
.sb-user{padding:1rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.8rem;}
.sb-avatar{width:38px;height:38px;border-radius:50%;border:2px solid var(--gold);object-fit:cover;flex-shrink:0;}
.sb-uname{font-size:.83rem;font-weight:700;}
.sb-uemail{font-size:.65rem;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:135px;}
.sb-ulevel{font-size:.62rem;color:var(--gold);background:rgba(245,197,24,.1);padding:1px 7px;border-radius:20px;display:inline-block;margin-top:2px;}
.sb-nav{flex:1;padding:.5rem 0;overflow-y:auto;}
.sb-sec{padding:.5rem 1.4rem .2rem;font-size:.6rem;color:var(--txt2);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-top:.3rem;}
.sb-item{display:flex;align-items:center;gap:.75rem;padding:.6rem 1.4rem;cursor:pointer;
  transition:all .2s;border-right:3px solid transparent;font-size:.82rem;color:var(--txt2);}
.sb-item:hover{background:rgba(245,197,24,.04);color:var(--txt);}
.sb-item.active{background:rgba(245,197,24,.08);color:var(--gold);border-right-color:var(--gold);}
.sb-ico{font-size:.9rem;min-width:18px;text-align:center;}
.sb-bdg{margin-right:auto;font-size:.6rem;font-weight:700;padding:1px 6px;border-radius:20px;}
.sb-bdg.g{background:var(--gold);color:#000;}
.sb-bdg.gr{background:var(--green);color:#000;}
.sb-bal{margin:.8rem;background:linear-gradient(135deg,rgba(245,197,24,.12),rgba(245,197,24,.03));
  border:1px solid var(--border);border-radius:13px;padding:.9rem 1rem;text-align:center;}
.bal-lbl{font-size:.68rem;color:var(--txt2);}
.bal-amt{font-size:1.6rem;font-weight:900;color:var(--gold);font-family:'Tajawal',sans-serif;}
.bal-usd{font-size:.72rem;color:var(--green);margin-top:1px;}
.btn-sb-w{width:100%;padding:8px;background:var(--gold);color:#000;border:none;
  border-radius:8px;font-family:'Cairo',sans-serif;font-size:.8rem;font-weight:700;
  cursor:pointer;margin-top:.65rem;transition:all .2s;}
.btn-sb-w:hover{background:var(--gold2);}

/* MAIN */
.main{margin-right:var(--sw);}
.topbar{background:rgba(8,8,14,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
  padding:0 1.8rem;height:58px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:40;}
.topbar-title{font-size:.95rem;font-weight:700;}
.topbar-right{display:flex;align-items:center;gap:.8rem;}
.notif-btn{width:34px;height:34px;background:var(--bg2);border:1px solid var(--border2);
  border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:.9rem;}
.notif-dot{position:absolute;top:6px;right:6px;width:6px;height:6px;background:var(--red);border-radius:50%;}
.signout-btn{padding:5px 13px;background:transparent;border:1px solid var(--border2);
  color:var(--txt2);border-radius:7px;font-family:'Cairo',sans-serif;font-size:.76rem;cursor:pointer;transition:all .2s;}
.signout-btn:hover{border-color:var(--red);color:var(--red);}
.content{padding:1.8rem;}
.page{display:none;}.page.active{display:block;}

/* WELCOME */
.welcome-banner{background:linear-gradient(135deg,rgba(245,197,24,.1),rgba(245,197,24,.02));
  border:1px solid var(--border);border-radius:16px;padding:1.4rem 1.8rem;
  margin-bottom:1.6rem;display:flex;align-items:center;justify-content:space-between;}
.welcome-banner h2{font-family:'Tajawal',sans-serif;font-size:1.2rem;font-weight:900;}
.welcome-banner p{font-size:.8rem;color:var(--txt2);margin-top:2px;}
.streak-box{text-align:center;background:rgba(245,197,24,.08);border:1px solid var(--border);border-radius:11px;padding:.6rem 1.1rem;}
.streak-num{font-size:1.5rem;font-weight:900;color:var(--gold);font-family:'Tajawal',sans-serif;display:block;}
.streak-lbl{font-size:.68rem;color:var(--txt2);}

/* STAT CARDS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.6rem;}
.stat-card{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:1.2rem 1.4rem;
  position:relative;overflow:hidden;transition:all .3s;}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4;}
.stat-card:hover{border-color:var(--border);transform:translateY(-2px);}
.sc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem;}
.sc-label{font-size:.72rem;color:var(--txt2);}
.sc-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem;}
.sc-value{font-size:1.5rem;font-weight:900;font-family:'Tajawal',sans-serif;}
.sc-sub{font-size:.68rem;color:var(--green);margin-top:2px;}

/* GRID + CARDS */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1.4rem;margin-bottom:1.6rem;}
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:1.4rem;}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;}
.card-title{font-size:.9rem;font-weight:700;}
.card-action{font-size:.73rem;color:var(--gold);cursor:pointer;}

/* TASK ITEMS */
.task-item{display:flex;align-items:center;gap:.8rem;padding:.75rem 0;border-bottom:1px solid var(--border2);}
.task-item:last-child{border-bottom:none;padding-bottom:0;}
.task-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;}
.task-info{flex:1;}
.task-name{font-size:.8rem;font-weight:600;}
.task-meta{font-size:.68rem;color:var(--txt2);margin-top:1px;}
.task-reward{font-size:.82rem;font-weight:700;color:var(--green);}
.btn-do{padding:5px 13px;background:rgba(245,197,24,.1);border:1px solid var(--border);
  color:var(--gold);border-radius:6px;font-family:'Cairo',sans-serif;
  font-size:.73rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:3px;display:block;}
.btn-do:hover{background:rgba(245,197,24,.2);}

/* ACTIVITY */
.act-item{display:flex;align-items:center;gap:.75rem;padding:.65rem 0;border-bottom:1px solid var(--border2);}
.act-item:last-child{border-bottom:none;}
.act-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.act-txt{flex:1;font-size:.78rem;color:var(--txt2);}
.act-txt strong{color:var(--txt);}
.act-amt{font-size:.8rem;font-weight:700;}
.act-time{font-size:.66rem;color:var(--txt2);}

/* CHART */
.chart-wrap{display:flex;align-items:flex-end;gap:5px;height:70px;margin:.8rem 0 .4rem;}
.bar{flex:1;border-radius:4px 4px 0 0;background:rgba(245,197,24,.2);transition:all .3s;cursor:pointer;position:relative;}
.bar:hover,.bar.active{background:var(--gold);}
.bar-tip{position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);
  background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:2px 6px;font-size:.65rem;white-space:nowrap;opacity:0;transition:.2s;}
.bar:hover .bar-tip{opacity:1;}
.chart-days{display:flex;gap:5px;}
.chart-day{flex:1;text-align:center;font-size:.62rem;color:var(--txt2);}

/* PROGRESS */
.ap{display:flex;align-items:center;gap:.8rem;margin-bottom:.45rem;}
.ap-lbl{font-size:.74rem;color:var(--txt2);min-width:100px;}
.ap-bar{flex:1;height:5px;background:var(--border2);border-radius:3px;overflow:hidden;}
.ap-fill{height:100%;background:var(--gold);border-radius:3px;}
.ap-val{font-size:.72rem;color:var(--gold);min-width:45px;text-align:left;}

/* ===== WITHDRAW PAGE ===== */
.w-wrap{max-width:680px;margin:0 auto;}
.wh-bal-box{background:linear-gradient(135deg,rgba(245,197,24,.12),rgba(245,197,24,.03));
  border:1px solid var(--border);border-radius:16px;padding:1.5rem 1.8rem;margin-bottom:1.4rem;
  display:flex;align-items:center;justify-content:space-between;}
.wh-left label{font-size:.75rem;color:var(--txt2);display:block;margin-bottom:.3rem;}
.wh-left strong{font-size:2rem;font-weight:900;color:var(--gold);font-family:'Tajawal',sans-serif;display:block;}
.wh-left small{font-size:.78rem;color:var(--green);}
.wh-min-box{text-align:center;background:var(--bg3);border:1px solid var(--border2);border-radius:11px;padding:.7rem 1rem;}
.wh-min-box span{font-size:.7rem;color:var(--txt2);display:block;}
.wh-min-box strong{font-size:1rem;color:var(--gold);font-family:'Tajawal',sans-serif;}

.sec-card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:1.4rem;margin-bottom:1.2rem;}
.sec-card h3{font-size:.9rem;font-weight:700;margin-bottom:1.1rem;}

/* WALLET GRID */
.wallet-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.8rem;}
.w-opt{background:var(--bg3);border:2px solid var(--border2);border-radius:13px;
  padding:1rem 1.1rem;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:.9rem;}
.w-opt:hover{border-color:var(--border);}
.w-opt.sel{border-color:var(--gold);background:rgba(245,197,24,.05);}
.w-logo{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.w-name{font-size:.86rem;font-weight:700;}
.w-sub{font-size:.68rem;color:var(--txt2);margin-top:1px;}
.w-fee{font-size:.67rem;color:var(--green);margin-top:2px;}
.w-chk{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);
  margin-right:auto;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;transition:.2s;}
.w-opt.sel .w-chk{border-color:var(--gold);background:var(--gold);color:#000;font-weight:900;}

/* FORM */
.fg{margin-bottom:.95rem;}
.fg label{display:block;font-size:.78rem;color:var(--txt2);margin-bottom:.4rem;}
.fg input{width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:10px;color:var(--txt);font-family:'Cairo',sans-serif;font-size:.88rem;outline:none;transition:.2s;}
.fg input:focus{border-color:var(--gold);}
.fg input::placeholder{color:var(--txt2);font-size:.82rem;}
.fg-note{font-size:.7rem;color:var(--txt2);margin-top:.35rem;line-height:1.5;}
.presets{display:flex;gap:.5rem;margin-top:.5rem;}
.preset{padding:5px 12px;background:var(--bg3);border:1px solid var(--border2);
  color:var(--txt2);border-radius:7px;font-family:'Cairo',sans-serif;font-size:.74rem;cursor:pointer;transition:.2s;}
.preset:hover{border-color:var(--gold);color:var(--gold);}

/* SUMMARY */
.sum-box{background:var(--bg3);border:1px solid var(--border);border-radius:13px;padding:1.1rem;margin-bottom:1.2rem;}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;font-size:.82rem;}
.sum-row:not(:last-child){border-bottom:1px solid var(--border2);}
.sum-row span{color:var(--txt2);}
.sum-row strong{font-weight:700;}
.sum-row.tot span{color:var(--txt);font-weight:700;}
.sum-row.tot strong{color:var(--green);font-size:.95rem;}

/* GIZ PLATFORM ADDR */
.giz-addr{background:rgba(245,197,24,.05);border:1px solid var(--border);border-radius:12px;padding:.9rem 1.1rem;margin-bottom:1.2rem;}
.giz-addr label{font-size:.72rem;color:var(--txt2);display:block;margin-bottom:.4rem;}
.giz-addr-val{font-size:.72rem;color:var(--gold);word-break:break-all;font-family:monospace;line-height:1.6;}

.warn-box{background:rgba(255,77,106,.06);border:1px solid rgba(255,77,106,.2);border-radius:10px;padding:.7rem .9rem;margin-bottom:1.2rem;font-size:.75rem;color:var(--txt2);line-height:1.6;}
.warn-box strong{color:var(--red);}

.btn-w-main{width:100%;padding:13px;background:var(--gold);color:#000;border:none;
  border-radius:11px;font-family:'Cairo',sans-serif;font-size:.95rem;font-weight:900;
  cursor:pointer;transition:all .25s;}
.btn-w-main:hover{background:var(--gold2);box-shadow:0 6px 24px rgba(245,197,24,.3);}

/* HISTORY */
.hist-item{display:flex;align-items:center;gap:.9rem;padding:.8rem 0;border-bottom:1px solid var(--border2);}
.hist-item:last-child{border-bottom:none;}
.hist-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.hist-info{flex:1;}
.hist-wallet{font-size:.82rem;font-weight:600;}
.hist-date{font-size:.68rem;color:var(--txt2);margin-top:1px;}
.hist-addr{font-size:.63rem;color:var(--txt2);font-family:monospace;margin-top:1px;}
.hist-right{text-align:left;}
.hist-amt{font-size:.88rem;font-weight:700;}
.hist-st{font-size:.65rem;padding:2px 8px;border-radius:20px;margin-top:3px;display:inline-block;}
.hist-st.done{background:rgba(34,209,122,.1);color:var(--green);}
.hist-st.pending{background:rgba(245,197,24,.1);color:var(--gold);}

/* ===== SURF ===== */
.surf-hdr{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.4rem;}
.surf-hdr-card{background:var(--bg2);border:1px solid var(--border2);border-radius:13px;padding:1rem 1.2rem;text-align:center;}
.surf-hdr-card span{font-size:.72rem;color:var(--txt2);display:block;margin-bottom:.3rem;}
.surf-hdr-card strong{font-size:1.4rem;font-weight:900;font-family:'Tajawal',sans-serif;}
.surf-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;overflow:hidden;margin-bottom:1.4rem;}
.surf-topbar{background:var(--bg3);border-bottom:1px solid var(--border);padding:.9rem 1.4rem;display:flex;align-items:center;justify-content:space-between;}
.surf-topbar h3{font-size:.88rem;font-weight:700;}
.surf-timer-big{font-size:2rem;font-weight:900;color:var(--gold);font-family:'Tajawal',sans-serif;}
.surf-body{padding:1.4rem;display:grid;grid-template-columns:1fr 178px;gap:1.2rem;}
.surf-preview{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:1.2rem;}
.surf-url{font-size:.7rem;color:var(--txt2);margin-bottom:.5rem;}
.surf-site-name{font-size:.95rem;font-weight:700;margin-bottom:.4rem;}
.surf-site-desc{font-size:.78rem;color:var(--txt2);line-height:1.65;}
.surf-prog{height:5px;background:var(--border2);border-radius:3px;overflow:hidden;margin-top:1rem;}
.surf-prog-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:3px;width:0;transition:width .5s linear;}
.surf-side{display:flex;flex-direction:column;gap:.8rem;}
.surf-rwd{background:linear-gradient(135deg,rgba(34,209,122,.1),rgba(34,209,122,.02));border:1px solid rgba(34,209,122,.2);border-radius:11px;padding:.9rem;text-align:center;}
.surf-rwd span{font-size:.7rem;color:var(--txt2);}
.surf-rwd strong{font-size:1.4rem;font-weight:900;color:var(--green);font-family:'Tajawal',sans-serif;display:block;}
.surf-mini{background:var(--bg3);border:1px solid var(--border2);border-radius:9px;padding:.65rem .9rem;display:flex;justify-content:space-between;align-items:center;}
.surf-mini span{font-size:.7rem;color:var(--txt2);}
.surf-mini strong{font-size:.78rem;font-weight:700;}
.btn-surf-next{width:100%;padding:10px;background:var(--gold);color:#000;border:none;border-radius:9px;font-family:'Cairo',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:.2s;}
.btn-surf-next:hover{background:var(--gold2);}
.btn-surf-next:disabled{opacity:.4;cursor:not-allowed;}

/* ===== UPGRADE ===== */
.utabs{display:flex;gap:.6rem;margin-bottom:1.4rem;flex-wrap:wrap;}
.utab{padding:8px 20px;border-radius:8px;border:1px solid var(--border2);color:var(--txt2);font-family:'Cairo',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;transition:.2s;background:none;}
.utab.active{background:var(--gold);color:#000;border-color:var(--gold);}
.usec{display:none;}.usec.active{display:block;}
.levels-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.1rem;}
.lv-card{background:var(--bg2);border:2px solid var(--border2);border-radius:16px;padding:1.5rem;text-align:center;transition:all .3s;position:relative;overflow:hidden;}
.lv-card.current{border-color:var(--gold);}
.lv-card.current::before{content:'مستواك الحالي';position:absolute;top:0;left:0;right:0;background:var(--gold);color:#000;font-size:.65rem;font-weight:700;padding:3px;text-align:center;}
.lv-ico{font-size:2.2rem;margin:.7rem 0 .6rem;}
.lv-name{font-size:1rem;font-weight:900;font-family:'Tajawal',sans-serif;margin-bottom:.8rem;}
.lv-perks{list-style:none;text-align:right;display:flex;flex-direction:column;gap:.35rem;margin-bottom:.8rem;}
.lv-perks li{font-size:.76rem;color:var(--txt2);display:flex;align-items:center;gap:.5rem;}
.lv-perks li::before{content:'✓';color:var(--green);font-weight:700;flex-shrink:0;}
.lv-price{font-size:1.3rem;font-weight:900;color:var(--gold);font-family:'Tajawal',sans-serif;margin-top:.5rem;}
